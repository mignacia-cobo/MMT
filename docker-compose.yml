services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_mmt
    restart: unless-stopped
    environment:
      POSTGRES_DB: mmt_valpo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mmt2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_mmt_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mmt_valpo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_mmt_data:
